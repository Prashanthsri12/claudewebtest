<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF5FB"/>
      <stop offset="100%" style="stop-color:#E8DAEF"/>
    </linearGradient>
    <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- White coat body -->
  <ellipse cx="200" cy="370" rx="130" ry="90" fill="url(#coat)" clip-path="url(#circle)"/>
  <!-- Shirt/tie -->
  <rect x="181" y="258" width="38" height="80" fill="#1a237e" opacity="0.7" clip-path="url(#circle)"/>
  <!-- Stethoscope -->
  <path d="M160 270 Q155 300 165 310 Q175 320 185 310" fill="none" stroke="#1a237e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="165" cy="315" r="8" fill="#17A589"/>
  <!-- Neck -->
  <rect x="184" y="228" width="32" height="40" fill="#D4A76A" clip-path="url(#circle)"/>
  <!-- Head -->
  <ellipse cx="200" cy="182" rx="54" ry="60" fill="#D4A76A"/>
  <!-- Hair - salt and pepper -->
  <ellipse cx="200" cy="141" rx="55" ry="23" fill="#4a4a4a"/>
  <ellipse cx="200" cy="150" rx="53" ry="16" fill="#5a5a5a"/>
  <!-- Eyes -->
  <ellipse cx="182" cy="181" rx="8" ry="9" fill="white"/>
  <ellipse cx="218" cy="181" rx="8" ry="9" fill="white"/>
  <circle cx="183" cy="182" r="5" fill="#1a1a2e"/>
  <circle cx="219" cy="182" r="5" fill="#1a1a2e"/>
  <circle cx="185" cy="180" r="2" fill="white"/>
  <circle cx="221" cy="180" r="2" fill="white"/>
  <!-- Eyebrows (slightly bushy) -->
  <path d="M173 172 Q182 168 191 172" fill="none" stroke="#4a4a4a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M209 172 Q218 168 227 172" fill="none" stroke="#4a4a4a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glasses -->
  <rect x="170" y="175" width="24" height="16" fill="none" stroke="#0A3D62" stroke-width="2" rx="4"/>
  <rect x="206" y="175" width="24" height="16" fill="none" stroke="#0A3D62" stroke-width="2" rx="4"/>
  <line x1="194" y1="183" x2="206" y2="183" stroke="#0A3D62" stroke-width="2"/>
  <line x1="155" y1="179" x2="170" y2="181" stroke="#0A3D62" stroke-width="2"/>
  <line x1="230" y1="181" x2="245" y2="179" stroke="#0A3D62" stroke-width="2"/>
  <!-- Smile -->
  <path d="M187 204 Q200 214 213 204" fill="none" stroke="#A0785A" stroke-width="2" stroke-linecap="round"/>
  <!-- White coat collar -->
  <path d="M150 255 L184 228 L184 278 L150 298 Z" fill="url(#coat)" clip-path="url(#circle)"/>
  <path d="M250 255 L216 228 L216 278 L250 298 Z" fill="url(#coat)" clip-path="url(#circle)"/>
  <!-- Name label -->
  <rect x="0" y="350" width="400" height="50" fill="rgba(26,35,126,0.85)"/>
  <text x="200" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Dr. K. Sankara Subramanian</text>
  <text x="200" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Replace with: doctor-sankara.jpg (400×400px)</text>
</svg>
