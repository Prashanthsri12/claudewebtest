<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A3D62"/>
      <stop offset="100%" style="stop-color:#17A589"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD"/>
      <stop offset="100%" style="stop-color:#D1ECF1"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="0" y="460" width="800" height="140" fill="#1a5276" opacity="0.4"/>
  <!-- Building body -->
  <rect x="150" y="200" width="500" height="280" fill="url(#wall)" rx="4"/>
  <!-- Roof -->
  <rect x="130" y="180" width="540" height="30" fill="#0A3D62" rx="4"/>
  <!-- Windows row 1 -->
  <rect x="200" y="240" width="80" height="60" fill="#17A589" opacity="0.6" rx="4"/>
  <rect x="310" y="240" width="80" height="60" fill="#17A589" opacity="0.6" rx="4"/>
  <rect x="420" y="240" width="80" height="60" fill="#17A589" opacity="0.6" rx="4"/>
  <rect x="530" y="240" width="80" height="60" fill="#17A589" opacity="0.6" rx="4"/>
  <!-- Windows row 2 -->
  <rect x="200" y="330" width="80" height="60" fill="#17A589" opacity="0.4" rx="4"/>
  <rect x="310" y="330" width="80" height="60" fill="#17A589" opacity="0.4" rx="4"/>
  <rect x="420" y="330" width="80" height="60" fill="#17A589" opacity="0.4" rx="4"/>
  <rect x="530" y="330" width="80" height="60" fill="#17A589" opacity="0.4" rx="4"/>
  <!-- Main door -->
  <rect x="340" y="390" width="120" height="90" fill="#0A3D62" rx="4"/>
  <rect x="380" y="400" width="40" height="80" fill="#17A589" opacity="0.5" rx="2"/>
  <!-- Medical cross sign -->
  <rect x="365" y="220" width="70" height="20" fill="#17A589" rx="3"/>
  <rect x="395" y="210" width="10" height="40" fill="#17A589" rx="3"/>
  <!-- Signboard -->
  <rect x="180" y="160" width="440" height="30" fill="#F0B429" rx="4"/>
  <text x="400" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A3D62">DYNAMIC CREATIVE HEALTH CARE</text>
  <!-- Label overlay -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,0,0,0.45)"/>
  <text x="400" y="567" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">📷 Replace with: about-clinic.jpg (Clinic exterior/interior photo)</text>
  <text x="400" y="587" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Recommended: 800×600px</text>
</svg>
