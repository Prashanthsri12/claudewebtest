<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17A589"/>
      <stop offset="100%" style="stop-color:#0A3D62"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="500" cy="100" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="360" r="100" fill="rgba(255,255,255,0.05)"/>
  <!-- House icon -->
  <polygon points="300,100 200,190 220,190 220,300 380,300 380,190 400,190" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="270" y="240" width="60" height="60" fill="rgba(255,255,255,0.2)" rx="3"/>
  <!-- Medical cross on house -->
  <rect x="288" y="160" width="24" height="8" fill="rgba(240,180,41,0.8)" rx="2"/>
  <rect x="296" y="152" width="8" height="24" fill="rgba(240,180,41,0.8)" rx="2"/>
  <!-- Window -->
  <rect x="225" y="215" width="35" height="35" fill="rgba(255,255,255,0.25)" rx="3"/>
  <rect x="340" y="215" width="35" height="35" fill="rgba(255,255,255,0.25)" rx="3"/>
  <!-- Label -->
  <rect x="0" y="390" width="600" height="60" fill="rgba(0,0,0,0.4)"/>
  <text x="300" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white" font-weight="bold">Home Care Services</text>
  <text x="300" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">Replace with: homecare.jpg (600×450px)</text>
</svg>
