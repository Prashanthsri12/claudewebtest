<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD"/>
      <stop offset="100%" style="stop-color:#D1ECF1"/>
    </linearGradient>
    <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EBF5FB"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="200" cy="200" r="200"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- White coat body -->
  <ellipse cx="200" cy="370" rx="130" ry="90" fill="url(#coat)" clip-path="url(#circle)"/>
  <!-- Shirt/tie -->
  <rect x="180" y="260" width="40" height="80" fill="#0A3D62" clip-path="url(#circle)"/>
  <!-- Stethoscope -->
  <path d="M160 270 Q155 300 165 310 Q175 320 185 310" fill="none" stroke="#0A3D62" stroke-width="3" stroke-linecap="round"/>
  <circle cx="165" cy="315" r="8" fill="#17A589"/>
  <!-- Neck -->
  <rect x="183" y="230" width="34" height="40" fill="#F4C7A7" clip-path="url(#circle)"/>
  <!-- Head -->
  <ellipse cx="200" cy="185" rx="55" ry="60" fill="#F4C7A7"/>
  <!-- Hair -->
  <ellipse cx="200" cy="145" rx="56" ry="25" fill="#2C3E50"/>
  <ellipse cx="200" cy="155" rx="52" ry="18" fill="#2C3E50"/>
  <!-- Eyes -->
  <ellipse cx="182" cy="183" rx="8" ry="9" fill="white"/>
  <ellipse cx="218" cy="183" rx="8" ry="9" fill="white"/>
  <circle cx="184" cy="184" r="5" fill="#1a1a2e"/>
  <circle cx="220" cy="184" r="5" fill="#1a1a2e"/>
  <circle cx="186" cy="182" r="2" fill="white"/>
  <circle cx="222" cy="182" r="2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M174 174 Q182 170 190 174" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <path d="M210 174 Q218 170 226 174" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M188 205 Q200 215 212 205" fill="none" stroke="#C07850" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M196 192 Q200 200 204 192" fill="none" stroke="#C07850" stroke-width="1.5" stroke-linecap="round"/>
  <!-- White coat collar -->
  <path d="M150 255 L183 230 L183 280 L150 300 Z" fill="url(#coat)" clip-path="url(#circle)"/>
  <path d="M250 255 L217 230 L217 280 L250 300 Z" fill="url(#coat)" clip-path="url(#circle)"/>
  <!-- Name label -->
  <rect x="0" y="350" width="400" height="50" fill="rgba(10,61,98,0.85)"/>
  <text x="200" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Dr. R. Prithviraj</text>
  <text x="200" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Replace with: doctor-prithviraj.jpg (400×400px)</text>
</svg>
