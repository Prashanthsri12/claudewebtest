  <polyline points="50,250 100,250 130,200 160,310 190,220 220,280 260,250 310,250 340,180 370,330 400,210 430,270 480,250 550,250" fill="none" stroke="rgba(240,180,41,0.85)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Microscope simplified -->
  <rect x="260" y="130" width="20" height="80" fill="rgba(255,255,255,0.5)" rx="3"/>
